<div>
  {{ os }}
  <span
    *ngIf="os_scan_status !== 1"
    class="type-label ms-2"
    [class.customer-rule]="os_scan_status === 2"
    [class.ground-rule]="os_scan_status === 0">
    {{
      (os_scan_status === 2 ? 'registry.OS_UNSUPPORTED' : 'registry.OS_UNKNOWN')
        | translate
    }}
  </span>
</div>
