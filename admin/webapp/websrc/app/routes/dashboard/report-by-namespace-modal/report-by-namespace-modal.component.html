<div class="screen-area">
  <div
    cdkDrag
    cdkDragHandle
    cdkDragRootElement=".cdk-overlay-pane"
    class="d-flex align-items-center justify-content-between"
    style="cursor: move; margin-top: -24px; padding-top: 10px">
    <div
      mat-dialog-title
      class="dialog-title"
      style="font-size: 16px; margin-top: 10px">
      {{ 'general.DOWNLOAD_PDF' | translate }}
    </div>
    <button
      mat-dialog-close
      aria-label="Close icon button"
      class="d-flex align-items-center justify-content-center"
      mat-icon-button>
      <i class="eos-icons">close</i>
    </button>
  </div>
  <hr class="fancy mt-1 mb-0 mx-0" />
  <div mat-dialog-content class="text-black-50">
    <div>
      <a class="text-ns" (click)="data.printDashboardReport()">
        {{ 'dashboard.ALL_NAMESPACE' | translate }}
      </a>
    </div>
    <div
      #domainTextEl
      class="text-overflow-ellipsis"
      *ngFor="let domain of data.domainList"
      [matTooltip]="domain"
      [matTooltipDisabled]="!isOverflow(domainTextEl)"
      matTooltipPosition="above">
      <a class="text-ns" (click)="printDashboardReportByDomain(domain)">
        {{ domain }}
      </a>
    </div>
  </div>
</div>
